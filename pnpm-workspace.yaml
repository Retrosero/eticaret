# pnpm workspace yapılandırması
# Türkçe e-ticaret SaaS platformu — Faz 1
packages:
  - "apps/*"
  - "packages/*"
  - "infra/scripts"
allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  argon2: true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
onlyBuiltDependencies:
  - "@nestjs/core"
  - "@scarf/scarf"
  - argon2
  - esbuild
  - sharp
  - unrs-resolver
  - "@swc/core"
  - "@prisma/client"
  - "@prisma/engines"
  - prisma
