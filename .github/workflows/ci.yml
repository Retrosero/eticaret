# EtiCart — GitHub Actions CI
#
# Her PR ve main branch push'unda çalışır:
#   1. Type-check (her app/paket için)
#   2. Birim testler (her app/paket için)
#   3. Build (production output doğrulama)
#
# Production deploy Coolify tarafından yapılır (DEPLOYMENT.md).

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # =============================================================
  # Lint + Type Check
  # =============================================================
  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check commerce-backend
        run: pnpm --filter @eticart/commerce-backend run type-check

      - name: Type-check storefront
        run: pnpm --filter @eticart/storefront run type-check

      - name: Type-check tenant-admin
        run: pnpm --filter @eticart/tenant-admin run type-check

      - name: Type-check payment-adapters
        run: pnpm --filter @eticart/payment-adapters run type-check

      - name: Type-check shipping-adapters
        run: pnpm --filter @eticart/shipping-adapters run type-check

      - name: Type-check einvoice-adapters
        run: pnpm --filter @eticart/einvoice-adapters run type-check

  # =============================================================
  # Unit Tests
  # =============================================================
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: eticart_test
          POSTGRES_USER: eticart
          POSTGRES_PASSWORD: eticart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test commerce-backend
        env:
          DATABASE_URL: postgresql://eticart:eticart_test@localhost:5432/eticart_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-jwt-secret-32-chars-minimum-ok
        run: pnpm --filter @eticart/commerce-backend run test

      - name: Test payment-adapters
        run: pnpm --filter @eticart/payment-adapters run test

      - name: Test shipping-adapters
        run: pnpm --filter @eticart/shipping-adapters run test

      - name: Test storefront
        run: pnpm --filter @eticart/storefront run test

      - name: Test einvoice-adapters
        run: pnpm --filter @eticart/einvoice-adapters run test

  # =============================================================
  # Build
  # =============================================================
  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @eticart/commerce-backend prisma generate

      - name: Build commerce-backend
        run: pnpm --filter @eticart/commerce-backend run build

      - name: Build storefront
        run: pnpm --filter @eticart/storefront run build

      - name: Build tenant-admin
        run: pnpm --filter @eticart/tenant-admin run build

      - name: Build payment-adapters
        run: pnpm --filter @eticart/payment-adapters run build

      - name: Build shipping-adapters
        run: pnpm --filter @eticart/shipping-adapters run build

      - name: Build einvoice-adapters
        run: pnpm --filter @eticart/einvoice-adapters run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            apps/commerce-backend/dist
            apps/storefront/.next
            apps/tenant-admin/.next
            packages/*/dist
          retention-days: 7

  # =============================================================
  # Docker Build (opsiyonel — Coolify bunu kendisi yapar)
  # =============================================================
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
  # =============================================================
  # E2E Backend (DB-bağımsız)
  # =============================================================
  e2e-backend:
    name: E2E Backend (supertest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: \${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run E2E backend tests (DB-independent)
        working-directory: apps/commerce-backend
        run: pnpm vitest run test/

  # =============================================================
  # E2E Playwright (Storefront + Admin smoke)
  # =============================================================
  e2e-playwright:
    name: E2E Playwright smoke
    runs-on: ubuntu-latest
    needs: [typecheck, test, build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: \${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Build apps (Next.js need build artifacts for SSR tests)
        run: pnpm turbo run build
      - name: Start backend (NestJS legacy placeholder)
        working-directory: apps/commerce-backend
        run: |
          USE_LEGACY_PLACEHOLDER=1 PORT=9000 node dist/main.js &
          sleep 3
      - name: Start storefront
        working-directory: apps/storefront
        run: |
          PORT=3000 node server.js &
          sleep 5
      - name: Start admin
        working-directory: apps/tenant-admin
        run: |
          PORT=3001 node server.js &
          sleep 5
      - name: Run Playwright tests
        env:
          STOREFRONT_URL: http://localhost:3000
          ADMIN_URL: http://localhost:3001
        run: pnpm exec playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7


      - name: Build backend image
        run: docker build -f apps/commerce-backend/Dockerfile -t eticart-backend:${{ github.sha }} .

      - name: Build storefront image
        run: docker build -f apps/storefront/Dockerfile -t eticart-storefront:${{ github.sha }} .

      - name: Build admin image
        run: docker build -f apps/tenant-admin/Dockerfile -t eticart-tenant-admin:${{ github.sha }} .

      # Coolify kendi registry'sinden çekebilir veya GHCR'a push edebilirsiniz
      - name: Push to GHCR
        if: env.GHCR_ENABLED == 'true'
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag eticart-backend:${{ github.sha }} ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          # ... (storefront, admin için tekrarla)