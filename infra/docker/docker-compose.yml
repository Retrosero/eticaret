# Türkçe e-ticaret SaaS — geliştirme altyapısı
# Postgres, Redis, MailHog (e-posta), MinIO (S3/R2 simülasyonu).
# Üretim compose dosyası: ./docker-compose.prod.yml
# Geliştirme override: ./docker-compose.dev.yml

services:
  postgres:
    image: postgres:16-alpine
    container_name: eticart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eticart
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eticart}
      POSTGRES_DB: eticart_control
      # Büyük-küçük harf hassasiyeti yok (Unicode'i doğru sıralayalım)
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eticart -d eticart_control"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: eticart-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: eticart-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web arayüzü — http://localhost:8025

  minio:
    image: minio/minio:latest
    container_name: eticart-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minio12345}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # MinIO Konsolu — http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
    name: eticart-postgres-data
  redis_data:
    name: eticart-redis-data
  minio_data:
    name: eticart-minio-data

networks:
  default:
    name: eticart-net
