# Üretim compose — Coolify tarafından okunabilir.
# Tüm port'lar varsayılan olarak kapatılır; uygulamalar proxy üzerinden
# servis keşfi yapar.

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: eticart_control
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d eticart_control"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Üretimde host port açma — sadece compose içi ağ
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "6379"

  mailhog:
    # Üretimde MailHog yerine gerçek SMTP kullanılır.
    # Bu compose dosyasında sadece yerel geliştirmedir; üretimde kullanılmaz.
    profiles: ["dev"]

volumes:
  postgres_data:
    name: eticart-postgres-prod

networks:
  default:
    name: eticart-prod
