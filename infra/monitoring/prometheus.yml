# Prometheus temel yapılandırması (Faz 1 placeholder).
# Faz 5+ ölçeklendirmesinde her uygulama /metrics endpoint'i ekleyecek.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'eticart-apps'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'host.docker.internal:4000'  # control-plane
          - 'host.docker.internal:9000'  # commerce-backend
          - 'host.docker.internal:3000'  # storefront
          - 'host.docker.internal:3001'  # tenant-admin
          - 'host.docker.internal:3002'  # super-admin
